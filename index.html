<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Notes App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">

    <header>
        <h1>📝 Notes Manager</h1>
        <p>Write, edit and manage your notes</p>
    </header>

    <!-- Create Note -->
    <div class="note-input">
        <textarea id="note-text" placeholder="Write your note here..."></textarea>
        <p id="error" class="error hidden">⚠ Note cannot be empty</p>
        <button id="add-btn">Add Note</button>
    </div>

    <!-- Notes -->
    <div id="notes-container" class="notes-container"></div>

</div>

<script src="script.js"></script>
</body>
</html>
