<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Online Quiz App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="quiz-wrapper">

    <div class="quiz-card">
        <h1 class="title">Online Quiz</h1>

        <!-- Start Screen -->
        <div id="start-screen">
            <p class="subtitle">Test your web development knowledge</p>
            <button id="start-btn" class="primary-btn">Start Quiz</button>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="hidden">
            <div class="quiz-header">
                <span id="progress"></span>
            </div>

            <h2 id="question"></h2>

            <div id="options"></div>

            <button id="next-btn" class="primary-btn" disabled>Next</button>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="hidden">
            <h2>Quiz Completed 🎉</h2>
            <p id="score" class="final-score"></p>
            <button onclick="location.reload()" class="primary-btn">Restart Quiz</button>
        </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
